bundle:
  name: sharepoint_ingestion

# Replace {workspace} with your Databricks workspace host, e.g.:
#   https://adb-1234567890123456.7.azuredatabricks.net
workspace:
  host: https://{workspace}.azuredatabricks.net

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
    workspace:
      # Replace {workspace-prod} with your production workspace host
      host: https://{workspace-prod}.azuredatabricks.net
